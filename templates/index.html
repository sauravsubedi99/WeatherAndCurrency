<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather &amp; Currency Exchange Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="text-center mb-4">Weather &amp; Currency Exchange</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h4 mb-3"><i class="fa-solid fa-cloud-sun me-2"></i>Weather</h2>
                    <div class="mb-3">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" id="city" value="London" placeholder="Enter city">
                    </div>
                    <button class="btn btn-primary w-100 mb-2" onclick="getWeather()">Get Weather</button>
                    <div id="weather-loading" class="text-center d-none">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="weather-result"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h4 mb-3"><i class="fa-solid fa-coins me-2"></i>Currency Exchange</h2>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" class="form-control" id="amount" value="100" step="0.01">
                    </div>
                    <div class="row">
                        <div class="col">
                            <label class="form-label" for="from-currency">From</label>
                            <select id="from-currency" class="form-select">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="GBP">GBP</option>
                                <option value="JPY">JPY</option>
                                <option value="CAD">CAD</option>
                                <option value="AUD">AUD</option>
                                <option value="CHF">CHF</option>
                                <option value="CNY">CNY</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label" for="to-currency">To</label>
                            <select id="to-currency" class="form-select">
                                <option value="EUR">EUR</option>
                                <option value="USD">USD</option>
                                <option value="GBP">GBP</option>
                                <option value="JPY">JPY</option>
                                <option value="CAD">CAD</option>
                                <option value="AUD">AUD</option>
                                <option value="CHF">CHF</option>
                                <option value="CNY">CNY</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-3 mb-2" onclick="getExchangeRate()">Convert</button>
                    <div id="exchange-loading" class="text-center d-none">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="exchange-result"></div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <h2 class="h4 mb-3"><i class="fa-solid fa-user me-2"></i>Customer Management</h2>
                    <form method="POST" action="/add_customer">
                        <div class="row g-2 align-items-end">
                            <div class="col-sm-6 col-md-4">
                                <label class="form-label" for="customer_name">Customer Name</label>
                                <input type="text" class="form-control" id="customer_name" name="customer_name" required>
                            </div>
                            <div class="col-12 col-sm-6 col-md-8 d-flex flex-wrap gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-pen-to-square me-1"></i>Submit
                                </button>
                                <a href="/customers" class="btn btn-info text-white">
                                    <i class="fa-solid fa-users me-1"></i>View All
                                </a>
                                <a href="/clear_customers" class="btn btn-danger" onclick="return confirm('Are you sure you want to clear all customers?')">
                                    <i class="fa-solid fa-trash me-1"></i>Clear All
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function getWeather() {
    const city = document.getElementById('city').value;
    const loadingEl = document.getElementById('weather-loading');
    const resultEl = document.getElementById('weather-result');

    if (!city.trim()) {
        alert('Please enter a city name');
        return;
    }

    loadingEl.classList.remove('d-none');
    resultEl.innerHTML = '';

    try {
        const response = await fetch(`/weather?city=${encodeURIComponent(city)}`);
        const data = await response.json();
        loadingEl.classList.add('d-none');

        if (data.success) {
            resultEl.innerHTML = `<div class="alert alert-info mt-2">
                <h5 class="mb-2"><i class="fa-solid fa-city me-2"></i>${data.city}</h5>
                <p><strong>Temperature:</strong> ${data.temperature}&deg;C</p>
                <p><strong>Description:</strong> ${data.description}</p>
                <p><strong>Humidity:</strong> ${data.humidity}%</p>
                <p><strong>Pressure:</strong> ${data.pressure} hPa</p>
            </div>`;
        } else {
            resultEl.innerHTML = `<div class="alert alert-danger mt-2">${data.error}</div>`;
        }
    } catch (error) {
        loadingEl.classList.add('d-none');
        resultEl.innerHTML = `<div class="alert alert-danger mt-2">Network error: ${error.message}</div>`;
    }
}

async function getExchangeRate() {
    const amount = document.getElementById('amount').value;
    const fromCurrency = document.getElementById('from-currency').value;
    const toCurrency = document.getElementById('to-currency').value;
    const loadingEl = document.getElementById('exchange-loading');
    const resultEl = document.getElementById('exchange-result');

    if (!amount || amount <= 0) {
        alert('Please enter a valid amount');
        return;
    }

    loadingEl.classList.remove('d-none');
    resultEl.innerHTML = '';

    try {
        const response = await fetch(`/exchange?from=${fromCurrency}&to=${toCurrency}&amount=${amount}`);
        const data = await response.json();
        loadingEl.classList.add('d-none');

        if (data.success) {
            resultEl.innerHTML = `<div class="alert alert-info mt-2">
                <p><strong>${data.original_amount} ${data.from_currency}</strong> = <strong>${data.converted_amount} ${data.to_currency}</strong></p>
                <p><strong>Exchange Rate:</strong> 1 ${data.from_currency} = ${data.rate} ${data.to_currency}</p>
            </div>`;
        } else {
            resultEl.innerHTML = `<div class="alert alert-danger mt-2">${data.error}</div>`;
        }
    } catch (error) {
        loadingEl.classList.add('d-none');
        resultEl.innerHTML = `<div class="alert alert-danger mt-2">Network error: ${error.message}</div>`;
    }
}

setTimeout(() => {
    document.querySelectorAll('.alert').forEach(el => {
        const alert = new bootstrap.Alert(el);
        alert.close();
    });
}, 5000);
</script>
</body>
</html>
